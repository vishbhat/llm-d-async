name: Trivy Scan
description: Scan container image with Trivy
inputs:
  image:
    required: true
runs:
  using: "composite"
  steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image }}
        format: 'table'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
